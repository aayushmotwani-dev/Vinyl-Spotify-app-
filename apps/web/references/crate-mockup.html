<h2 class="sr-only">A horizontal crate of records to flip through - the selected record shows its full cover face, the others show only the edge of their sleeve, with edge thickness varying per item. Below it, the selected record's title, subtitle, and Play, Shuffle, and Tracklist buttons.</h2>

<div style="display:flex;gap:24px;margin-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary);">
  <button class="tabbtn" data-tab="albums" style="background:none;border:none;padding:8px 0;font-size:14px;font-weight:500;color:var(--color-text-primary);border-bottom:2px solid var(--color-border-info);cursor:pointer;">Albums</button>
  <button class="tabbtn" data-tab="playlists" style="background:none;border:none;padding:8px 0;font-size:14px;font-weight:500;color:var(--color-text-secondary);border-bottom:2px solid transparent;cursor:pointer;">Playlists</button>
</div>

<div id="crate" style="display:flex;align-items:flex-end;justify-content:center;gap:4px;height:170px;overflow:hidden;"></div>

<div style="text-align:center;margin-top:1rem;">
  <p id="recTitle" style="font-weight:500;font-size:16px;margin:0;"></p>
  <p id="recSub" style="font-size:13px;color:var(--color-text-secondary);margin:4px 0 0;"></p>
  <div style="display:flex;justify-content:center;gap:8px;margin-top:12px;">
    <button id="playBtn"><i class="ti ti-player-play" aria-hidden="true"></i> Play</button>
    <button id="shuffleBtn"><i class="ti ti-arrows-shuffle" aria-hidden="true"></i> Shuffle</button>
    <button id="trackBtn"><i class="ti ti-list" aria-hidden="true"></i> Tracklist</button>
  </div>
</div>

<div id="tracklist" style="margin-top:1rem;"></div>

<script>
const records = [
  {title:'Album A', sub:'Artist one', thickness:10},
  {title:'Album B', sub:'Artist two', thickness:16},
  {title:'Album C', sub:'Artist three', thickness:8},
  {title:'Album D', sub:'Artist four', thickness:22},
  {title:'Album E', sub:'Artist five', thickness:12},
  {title:'Album F', sub:'Artist six', thickness:18},
  {title:'Album G', sub:'Artist seven', thickness:14}
];
let active = 3;
const crate = document.getElementById('crate');

function render(){
  crate.innerHTML = '';
  records.forEach((r,i)=>{
    const isActive = i===active;
    const item = document.createElement('div');
    item.style.display='flex';
    item.style.alignItems='flex-end';
    item.style.cursor='pointer';
    item.onclick=()=>{active=i; render(); updateInfo();};

    const face = document.createElement('div');
    face.style.background='var(--color-background-secondary)';
    face.style.borderRadius='var(--border-radius-md)';
    face.style.display='flex';
    face.style.alignItems='center';
    face.style.justifyContent='center';
    face.style.transition='all 0.25s ease';
    face.style.overflow='hidden';
    face.style.flexShrink='0';
    face.style.width= isActive ? '150px':'0px';
    face.style.height= isActive ? '150px':'130px';

    const icon=document.createElement('i');
    icon.className='ti ti-disc';
    icon.setAttribute('aria-hidden','true');
    icon.style.fontSize='28px';
    icon.style.color='var(--color-text-tertiary)';
    face.appendChild(icon);

    const edge=document.createElement('div');
    edge.style.background='var(--color-border-secondary)';
    edge.style.borderRadius='var(--border-radius-md)';
    edge.style.width=r.thickness+'px';
    edge.style.height= isActive ? '150px':'130px';
    edge.style.flexShrink='0';
    edge.style.opacity= isActive ? '1':'0.6';
    edge.style.transition='all 0.25s ease';

    item.appendChild(face);
    item.appendChild(edge);
    crate.appendChild(item);
  });
}

function updateInfo(){
  document.getElementById('recTitle').textContent=records[active].title;
  document.getElementById('recSub').textContent=records[active].sub;
}

render();
updateInfo();

document.getElementById('trackBtn').onclick=function(){
  const tl=document.getElementById('tracklist');
  if(tl.childElementCount){ tl.innerHTML=''; return; }
  const tracks=[['1','Track one','3:24'],['2','Track two','4:01'],['3','Track three','2:58']];
  tracks.forEach(t=>{
    const row=document.createElement('div');
    row.style.display='flex';
    row.style.justifyContent='space-between';
    row.style.padding='8px 0';
    row.style.borderBottom='0.5px solid var(--color-border-tertiary)';
    row.style.fontSize='13px';
    row.innerHTML='<span>'+t[0]+'. '+t[1]+'</span><span style="color:var(--color-text-secondary)">'+t[2]+'</span>';
    tl.appendChild(row);
  });
};

document.getElementById('playBtn').onclick=function(){
  const i=this.querySelector('i');
  if(i.classList.contains('ti-player-play')){
    i.classList.remove('ti-player-play'); i.classList.add('ti-player-pause');
    this.lastChild.textContent=' Pause';
  } else {
    i.classList.remove('ti-player-pause'); i.classList.add('ti-player-play');
    this.lastChild.textContent=' Play';
  }
};

document.getElementById('shuffleBtn').onclick=function(){
  const on = this.style.color==='var(--color-text-info)';
  this.style.color = on ? '' : 'var(--color-text-info)';
  this.style.borderColor = on ? '' : 'var(--color-border-info)';
};

document.querySelectorAll('.tabbtn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tabbtn').forEach(b=>{b.style.borderBottomColor='transparent'; b.style.color='var(--color-text-secondary)';});
    btn.style.borderBottomColor='var(--color-border-info)';
    btn.style.color='var(--color-text-primary)';
  };
});
</script>
